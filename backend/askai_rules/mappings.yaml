# AskAI domain config for text2SQL (edit YAML only — no Python changes per question).
#
# When the LLM gets a question wrong, add a similar few-shot example here.
# synonyms.yaml holds equipment/metric words; this file holds SQL patterns.

version: 1
default_grain: minute
few_shot_max: 12

# Which table family for time ranges (edit here — not in Python).
# Matched on unit word after "last N" or "past N" (e.g. last 3 years -> day).
duration_grain:
  day: [year, years, month, months, week, weeks, day, days]
  minute: [hour, hours]

# Explicit words in the question (checked if no duration match).
explicit_grain:
  minute: [minute, minutely, live, realtime, corp]
  hour: [hourly, hour data, from hourly, per hour]
  day: [daily, day wise, per day]

# Injected into LLM prompt as-is.
grain_hint: >-
  Time grain: last N hours -> corp (minute);
  last N days/weeks/months/years -> Day table;
  hourly data -> Hour table.
  Always use the table listed under Schema for this question (from equipment + grain routing).
  Equipment number does not equal Dc number (e.g. K2 uses Dc4 tables, K3 uses Dc6).

# Production is NOT {prefix}_Production. Use AverageProduction / TotalProduction.
column_hint: >-
  Production columns use AverageProduction or TotalProduction suffixes
  (e.g. [K3_AverageProduction], not [K3_Production]).
  Raw mill 2: [RM2_RP1_AverageProduction], [RM2_RP2_AverageProduction].
  In one question, every column must use the SAME equipment prefix
  (e.g. kiln 2 -> [K2_*] only, never mix [K1_*] with kiln 2).
  Degree of calcination: spell Calcination (not Calculation). Exact columns:
  [K1_DegreeofCalcination], [K2_DegreeOfCalcination], [K3_DegreeOfCalcination].
  Copy the exact column name from Schema or Metric columns in every clause (SELECT and WHERE).

aggregate_hint: >-
  For SUM/AVG/COUNT/MIN/MAX over a date range or BETWEEN dates: return ONE summary row.
  Do NOT GROUP BY [DateAndTime] unless the user asks for per-day/per-hour trend or breakdown.
  Do NOT use ORDER BY [DateAndTime] unless [DateAndTime] is in SELECT and GROUP BY.
  Use ROUND(..., 2) when the user asks to round to 2 decimals.

# When {prefix}_{suffix} is wrong, map question phrase -> exact column name(s). Edit YAML only.
equipment_column_overrides:
  RM2:
    production: [RM2_RP1_AverageProduction, RM2_RP2_AverageProduction]
    total production: [RM2_RP1_TotalProduction, RM2_RP2_TotalProduction]
  K2:
    degree of calcination: [K2_DegreeOfCalcination]
    calcination: [K2_DegreeOfCalcination]
  K3:
    degree of calcination: [K3_DegreeOfCalcination]
    calcination: [K3_DegreeOfCalcination]
  K1:
    degree of calcination: [K1_DegreeofCalcination]
    calcination: [K1_DegreeofCalcination]

few_shot:
  - question: How many rows in Dc1corp?
    sql: SELECT COUNT(*) AS [row_count] FROM [Dc1corp]

  - question: How many columns in Dc1corp?
    sql: SELECT COUNT(*) AS [column_count] FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_SCHEMA = N'dbo' AND TABLE_NAME = N'Dc1corp'

  - question: What is kiln 1 feed?
    sql: SELECT TOP 1 [DateAndTime], [K1_Feed] FROM [Dc1corp] WHERE [K1_Feed] IS NOT NULL ORDER BY [DateAndTime] DESC

  - question: Show kiln 1 current for last 24 hours
    sql: SELECT TOP 200 [DateAndTime], [K1_Current] FROM [Dc1corp] WHERE [DateAndTime] >= DATEADD(hour, -24, GETDATE()) ORDER BY [DateAndTime] DESC

  - question: Show kiln 2 speed from hourly data today
    sql: SELECT TOP 200 [DateAndTime], [K2_Speed] FROM [Dc4Hour] WHERE CAST([DateAndTime] AS date) = CAST(GETDATE() AS date) ORDER BY [DateAndTime] DESC

  - question: Show finish mill 1 feed daily for last 7 days
    sql: SELECT TOP 200 [DateAndTime], [FM1_Feed] FROM [Dc2Day] WHERE [DateAndTime] >= DATEADD(day, -7, GETDATE()) ORDER BY [DateAndTime] DESC

  - question: Show kiln 2 current for last 3 years
    sql: SELECT TOP 200 [DateAndTime], [K2_Current] FROM [Dc4Day] WHERE [DateAndTime] >= DATEADD(year, -3, GETDATE()) ORDER BY [DateAndTime] DESC

  - question: Show kiln 3 production for last 3 years
    sql: SELECT TOP 200 [DateAndTime], [K3_AverageProduction] FROM [Dc6Day] WHERE [DateAndTime] >= DATEADD(year, -3, GETDATE()) ORDER BY [DateAndTime] DESC

  - question: Show me sum of kiln 3 production for last 3 years
    sql: SELECT SUM([K3_TotalProduction]) AS [sum_kiln_3_production] FROM [Dc6Day] WHERE [DateAndTime] >= DATEADD(year, -3, GETDATE())

  - question: Show me the sum of kiln 2 stack nox times stack so2 for the last 3 years
    sql: SELECT SUM([K2_StackNOX] * [K2_StackSO2]) AS [sum_nox_so2_product] FROM [Dc4Day] WHERE [DateAndTime] >= DATEADD(year, -3, GETDATE())

  - question: For kiln 2 daily data between 2024-01-01 and 2024-12-31, round to 2 decimals summary of stack nox times stack so2, average inlet pressure, max main burner fuel ratio, min feed lsf, average stack co2 minus inlet no, and count of degree of calcination where not null
    sql: SELECT ROUND(SUM([K2_StackNOX] * [K2_StackSO2]), 2) AS [sum_nox_so2_product], ROUND(AVG([K2_InletPressure]), 2) AS [avg_inlet_pressure], ROUND(MAX([K2_MainBurnerFuelRatio]), 2) AS [max_fuel_ratio], ROUND(MIN([K2_FeedLSF]), 2) AS [min_feed_lsf], ROUND(AVG([K2_StackCO2] - [K2_InletNO]), 2) AS [avg_co2_minus_inlet_no], COUNT([K2_DegreeOfCalcination]) AS [calcination_count] FROM [Dc4Day] WHERE [DateAndTime] BETWEEN '2024-01-01' AND '2024-12-31' AND [K2_DegreeOfCalcination] IS NOT NULL
