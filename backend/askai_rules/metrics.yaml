# AskAI approved metrics and SQL templates.
# Fast path: known intents run these templates directly (no LLM SQL generation).

version: 1
database: PDM

defaults:
  top_k: 200
  default_grain: hour

metrics:
  latest_tag_value:
    description: Latest value for an equipment metric
    grain: minute
    intent_keywords: [latest, current value, now, most recent]
    params: [equipment_prefix, column_suffix]
    sql: |
      SELECT TOP 1 DateAndTime, {column_name}
      FROM {table_name}
      WHERE {column_name} IS NOT NULL
      ORDER BY DateAndTime DESC

  tag_trend_by_date:
    description: Trend for one equipment metric between two dates
    grain: hour
    intent_keywords: [trend, between, from, to, history]
    params: [equipment_prefix, column_suffix, from_datetime, to_datetime]
    sql: |
      SELECT TOP {top_k} DateAndTime, {column_name}
      FROM {table_name}
      WHERE DateAndTime >= :from_datetime
        AND DateAndTime < :to_datetime
        AND {column_name} IS NOT NULL
      ORDER BY DateAndTime

  daily_average_metric:
    description: Daily average for one metric using day table
    grain: day
    intent_keywords: [daily average, day wise, per day]
    params: [equipment_prefix, column_suffix, from_date, to_date]
    sql: |
      SELECT TOP {top_k} CAST(DateAndTime AS date) AS day_date,
             AVG({column_name}) AS avg_value
      FROM {table_name}
      WHERE CAST(DateAndTime AS date) >= :from_date
        AND CAST(DateAndTime AS date) <= :to_date
        AND {column_name} IS NOT NULL
      GROUP BY CAST(DateAndTime AS date)
      ORDER BY day_date

  compare_two_tags_same_time:
    description: Compare two metrics for same equipment at same timestamps
    grain: hour
    intent_keywords: [compare, vs, versus]
    params: [equipment_prefix, column_suffix_a, column_suffix_b, from_datetime, to_datetime]
    sql: |
      SELECT TOP {top_k} DateAndTime,
             {column_name_a} AS metric_a,
             {column_name_b} AS metric_b
      FROM {table_name}
      WHERE DateAndTime >= :from_datetime
        AND DateAndTime < :to_datetime
      ORDER BY DateAndTime

starter_questions:
  - id: q1
    text: "Show latest kiln 1 current from minute data"
    metric: latest_tag_value
    equipment_prefix: K1
    column_suffix: Current
    grain: minute
  - id: q2
    text: "Show hourly kiln 2 speed for last 24 hours"
    metric: tag_trend_by_date
    equipment_prefix: K2
    column_suffix: Speed
    grain: hour
  - id: q3
    text: "Show daily average finish mill 1 feed for last 7 days"
    metric: daily_average_metric
    equipment_prefix: FM1
    column_suffix: Feed
    grain: day
  - id: q4
    text: "Compare kiln 1 current vs speed hourly today"
    metric: compare_two_tags_same_time
    equipment_prefix: K1
    column_suffix_a: Current
    column_suffix_b: Speed
    grain: hour
