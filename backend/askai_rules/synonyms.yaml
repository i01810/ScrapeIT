# AskAI domain dictionary for PDM database.
# Purpose: map human words -> exact table/column patterns.
#
# This is NOT full RAG. It is structured business context injected into the
# SQL agent prompt and schema linking (equipment -> table, metric -> column).

version: 1
database: PDM

# Only these table families should be used for analytics queries.
table_families:
  minute:
    suffix: corp
    description: Minute-wise process data (highest resolution)
    examples: [Dc1corp, Dc2corp, Dc3corp, Dc4corp, Dc5corp, Dc6corp, Dc7corp, Dc8corp]
  hour:
    suffix: Hour
    description: Hourly aggregated process data
    examples: [Dc1Hour, Dc2Hour, Dc3Hour, Dc4Hour, Dc5Hour, Dc6Hour, Dc7Hour, Dc8Hour]
  day:
    suffix: Day
    description: Day-wise aggregated process data
    examples: [Dc1Day, Dc2Day, Dc3Day, Dc4Day, Dc5Day, Dc6Day, Dc7Day, Dc8Day]

# Common columns across all family tables
common_columns:
  timestamp: DateAndTime
  notes:
    - DateAndTime is the shared time column in corp/Hour/Day tables.
    - Most tag columns are shared across minute/hour/day tables for same Dc group.

# Dc group mapping (from schema snapshot + plant domain knowledge)
dc_groups:
  Dc1:
    tables: { minute: Dc1corp, hour: Dc1Hour, day: Dc1Day }
    equipment_prefixes: [K1]
  Dc2:
    tables: { minute: Dc2corp, hour: Dc2Hour, day: Dc2Day }
    equipment_prefixes: [FM1, FM2]
  Dc3:
    tables: { minute: Dc3corp, hour: Dc3Hour, day: Dc3Day }
    equipment_prefixes: [CM1, RM1, RP]
  Dc4:
    tables: { minute: Dc4corp, hour: Dc4Hour, day: Dc4Day }
    equipment_prefixes: [K2]
  Dc5:
    tables: { minute: Dc5corp, hour: Dc5Hour, day: Dc5Day }
    equipment_prefixes: [CM2, RM2]
  Dc6:
    tables: { minute: Dc6corp, hour: Dc6Hour, day: Dc6Day }
    equipment_prefixes: [K3, KL3, RM3]
  Dc7:
    tables: { minute: Dc7corp, hour: Dc7Hour, day: Dc7Day }
    equipment_prefixes: [CM3, FM4]
  Dc8:
    tables: { minute: Dc8corp, hour: Dc8Hour, day: Dc8Day }
    equipment_prefixes: [FM3, FM5, Recipe1, Recipe2]

# Equipment prefix dictionary
equipment_prefixes:
  K1: { name: Kiln 1, dc_group: Dc1, example_columns: [K1_Current, K1_Speed, K1_Feed, K1_InletTemp, K1_InletNO, K1_InletPressure, K1_MainBurnerFuelRatio, K1_StackNOX, K1_StackSO2, K1_StackCO2, K1_RawMeal, K1_FeedLSF, K1_DegreeofCalcination] }
  K2: { name: Kiln 2, dc_group: Dc4, example_columns: [K2_Current, K2_Speed, K2_Feed, K2_InletNO, K2_InletPressure, K2_MainBurnerFuelRatio, K2_StackNOX, K2_StackSO2, K2_StackCO2, K2_RawMeal, K2_FeedLSF, K2_DegreeOfCalcination] }
  K3: { name: Kiln 3, dc_group: Dc6, example_columns: [K3_Current, K3_Speed, K3_Feed, K3_InletNO, K3_InletPressure, K3_MainBurnerFuelRatio, K3_StackNOX, K3_StackSO2, K3_StackCO2, K3_RawMeal, K3_FeedLSF, K3_DegreeOfCalcination] }
  RM1: { name: Raw Mill 1, dc_group: Dc3, example_columns: [RM1_Current, RM1_Feed] }
  RM2: { name: Raw Mill 2, dc_group: Dc5, example_columns: [RM2_Current, RM2_Feed] }
  RM3: { name: Raw Mill 3, dc_group: Dc6, example_columns: [RM3_Current, RM3_Feed] }
  CM1: { name: Cement Mill 1, dc_group: Dc3, example_columns: [CM1_Current, CM1_Feed] }
  CM2: { name: Cement Mill 2, dc_group: Dc5, example_columns: [CM2_Current, CM2_Feed] }
  CM3: { name: Cement Mill 3, dc_group: Dc7, example_columns: [CM3_Current, CM3_Feed] }
  FM1: { name: Finish Mill 1, dc_group: Dc2, example_columns: [FM1_Current, FM1_Feed] }
  FM2: { name: Finish Mill 2, dc_group: Dc2, example_columns: [FM2_Current, FM2_Feed] }
  FM3: { name: Finish Mill 3, dc_group: Dc8, example_columns: [FM3_Current, FM3_Feed] }
  FM4: { name: Finish Mill 4, dc_group: Dc7, example_columns: [FM4_Current, FM4_Feed] }
  FM5: { name: Finish Mill 5, dc_group: Dc8, example_columns: [FM5_Current, FM5_Feed] }

# Natural language synonyms -> canonical token/column pattern
synonyms:
  # time grain words
  minute: { grain: minute }
  minutely: { grain: minute }
  realtime: { grain: minute }
  live: { grain: minute }
  hour: { grain: hour }
  hourly: { grain: hour }
  day: { grain: day }
  daily: { grain: day }

  # equipment words
  kiln 1: { equipment_prefix: K1 }
  kiln1: { equipment_prefix: K1 }
  k1: { equipment_prefix: K1 }
  kiln 2: { equipment_prefix: K2 }
  kiln2: { equipment_prefix: K2 }
  k2: { equipment_prefix: K2 }
  kiln 3: { equipment_prefix: K3 }
  kiln3: { equipment_prefix: K3 }
  k3: { equipment_prefix: K3 }

  raw mill 1: { equipment_prefix: RM1 }
  rm1: { equipment_prefix: RM1 }
  raw mill 2: { equipment_prefix: RM2 }
  rm2: { equipment_prefix: RM2 }
  raw mill 3: { equipment_prefix: RM3 }
  rm3: { equipment_prefix: RM3 }

  cement mill 1: { equipment_prefix: CM1 }
  cm1: { equipment_prefix: CM1 }
  cement mill 2: { equipment_prefix: CM2 }
  cm2: { equipment_prefix: CM2 }
  cement mill 3: { equipment_prefix: CM3 }
  cm3: { equipment_prefix: CM3 }

  finish mill 1: { equipment_prefix: FM1 }
  fm1: { equipment_prefix: FM1 }
  finish mill 2: { equipment_prefix: FM2 }
  fm2: { equipment_prefix: FM2 }
  finish mill 3: { equipment_prefix: FM3 }
  fm3: { equipment_prefix: FM3 }
  finish mill 4: { equipment_prefix: FM4 }
  fm4: { equipment_prefix: FM4 }
  finish mill 5: { equipment_prefix: FM5 }
  fm5: { equipment_prefix: FM5 }

  # metric words -> column suffix patterns
  current: { column_suffix: Current }
  power: { column_suffix: Current }
  amp: { column_suffix: Current }
  amperage: { column_suffix: Current }
  speed: { column_suffix: Speed }
  feed: { column_suffix: Feed }
  production: { column_suffix: AverageProduction }
  total production: { column_suffix: TotalProduction }
  temperature: { column_suffix: Temp }
  temp: { column_suffix: Temp }
  pressure: { column_suffix: Pressure }
  flow: { column_suffix: Flow }

  # kiln process / emissions / quality (maps to K1_*, K2_*, K3_* via equipment prefix)
  # degree of calcination: use equipment_column_overrides in mappings.yaml (K1/K2/K3 spellings differ).
  main burner fuel ratio: { column_suffix: MainBurnerFuelRatio }
  inlet pressure: { column_suffix: InletPressure }
  inlet no: { column_suffix: InletNO }
  stack nox: { column_suffix: StackNOX }
  stack so2: { column_suffix: StackSO2 }
  stack co2: { column_suffix: StackCO2 }
  feed lsf: { column_suffix: FeedLSF }
  raw meal: { column_suffix: RawMeal }
  fuel ratio: { column_suffix: MainBurnerFuelRatio }
  nox: { column_suffix: StackNOX }
  so2: { column_suffix: StackSO2 }
  co2: { column_suffix: StackCO2 }
  lsf: { column_suffix: FeedLSF }

# Query routing hints
routing:
  default_grain: hour
  ignore_other_tables: true
  allowed_table_suffixes: [corp, Hour, Day]

# Examples for LLM few-shot guidance
examples:
  - question: "Show kiln 1 current for last 1 hour (minute data)"
    table: Dc1corp
    columns: [DateAndTime, K1_Current]
  - question: "Show kiln 2 speed hourly for today"
    table: Dc4Hour
    columns: [DateAndTime, K2_Speed]
  - question: "Show finish mill 1 feed daily trend this week"
    table: Dc2Day
    columns: [DateAndTime, FM1_Feed]
